name: Test basic file existence (file exists)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a test file
        run: touch /tmp/test-file.txt
      - id: action
        uses: .
        with:
          files: /tmp/test-file.txt
      - name: Assert files_exists is true
        env:
          ACTUAL: ${{ steps.action.outputs.files_exists }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "true" ]; then
            echo "FAIL: expected 'true' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
