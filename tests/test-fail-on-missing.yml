name: Test fail input causes action to fail on missing files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          files: /tmp/this-file-does-not-exist-fail-test.txt
          fail: true
      - name: Assert action failed due to missing file
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ACTUAL: ${{ steps.action.outputs.files_exists }}
        run: |
          echo "outcome: $OUTCOME"
          echo "files_exists: $ACTUAL"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on missing file"
